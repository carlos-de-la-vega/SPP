<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Satellite Pass Prediction</title>

  <link rel="icon" href="assets/favicon.ico">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #f2f2f2;
    }

    header {
      background-color: #004080;
      color: white;
      padding: 15px 20px;
      display: flex;
      align-items: center;
    }

    .logo {
      height: 40px;
      margin-right: 10px;
    }

    header h1 {
      margin: 0;
      margin-left: 10px;
      font-size: 24px;
    }

    .home-button {
      margin-left: auto;
      color: white;
      text-decoration: none;
      background-color: #0066cc;
      padding: 8px 12px;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }

    .home-button:hover {
      background-color: #003366;
    }

    main {
      flex: 1;
      width: 90%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px 0;
    }

    .intro {
      margin-bottom: 20px;
      color: #333;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 25px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="range"] {
      width: 150px;
    }

    input[type="date"],
    select {
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background-color: #004080;
      color: white;
      padding: 12px;
    }

    td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    tr:hover {
      background-color: #f5f9ff;
    }

    footer {
      padding: 10px;
      background-color: #004080;
      color: white;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  <img src="assets/medusablanca.png" alt="Logo" class="logo">
  <img src="assets/logoobseablanco.png" alt="Logo" class="logo">

  <h1>Satellite Pass Prediction</h1>

  <a href="https://www.obsea.es/" target="_blank" class="home-button">
    Home
  </a>
</header>

<main>

  <div class="intro">
    SPP for different testing locations, min.elev. angles and pass duration.
  </div>

  <div class="controls">

    <div class="control-group">
      📅 Date
      <input type="date" id="datePicker">
    </div>

    <div class="control-group">
      📍 Location
      <select id="locationSelect"></select>
    </div>

    <div class="control-group">
      ⛰️ Min. elevation
      <input type="range" id="elevationSlider">
      <span id="elevationValue"></span>°
    </div>

    <div class="control-group">
      ⏱️ Min. duration
      <input type="range" id="durationSlider">
      <span id="durationValue"></span> min
    </div>

  </div>

  <table id="tabla">
    <thead>
      <tr>
        <th>Satellite</th>
        <th>Rise</th>
        <th>Culmination</th>
        <th>Set</th>
        <th>Elevation</th>
        <th>Duration (min)</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</main>

<footer>
  <p>&copy; 2026 Carlos de la Vega Blanco.</p>
</footer>

<script>
const url = "https://carlos-de-la-vega.github.io/SPP/data/passes.json";

let dataGlobal = [];

fetch(url)
  .then(res => res.json())
  .then(data => {
    dataGlobal = data;
    initControls(data);
    render();
  })
  .catch(err => {
    console.error("Error cargando datos:", err);
    document.querySelector("#tabla tbody").innerHTML =
      "<tr><td colspan='6'>Error cargando datos</td></tr>";
  });

function cleanNumber(value) {
  return parseFloat(value.toString().replace(/[^\d.]/g, ""));
}

function initControls(data) {
  const datePicker = document.getElementById("datePicker");
  const locationSelect = document.getElementById("locationSelect");

  const elevationSlider = document.getElementById("elevationSlider");
  const durationSlider = document.getElementById("durationSlider");

  const elevationValue = document.getElementById("elevationValue");
  const durationValue = document.getElementById("durationValue");

  const today = data[0]?.Date || new Date().toISOString().split("T")[0];
  datePicker.value = today;

  const locations = [...new Set(data.map(r => r.Location))];

  locations.forEach(loc => {
    const option = document.createElement("option");
    option.value = loc;
    option.textContent = loc;
    locationSelect.appendChild(option);
  });

  if (locations.length > 0) {
    locationSelect.value = locations[0];
  }

  const elevations = data.map(r => cleanNumber(r.Elevation));
  const durations = data.map(r => cleanNumber(r.Duration));

  const minElevation = Math.min(...elevations);
  const maxElevation = Math.max(...elevations);

  const minDuration = Math.min(...durations);
  const maxDuration = Math.max(...durations);

  elevationSlider.min = minElevation;
  elevationSlider.max = maxElevation;
  elevationSlider.value = minElevation;
  elevationSlider.step = 1;

  durationSlider.min = minDuration;
  durationSlider.max = maxDuration;
  durationSlider.value = minDuration;
  durationSlider.step = 1;

  elevationValue.textContent = elevationSlider.value;
  durationValue.textContent = durationSlider.value;

  datePicker.addEventListener("change", render);
  locationSelect.addEventListener("change", render);

  elevationSlider.addEventListener("input", () => {
    elevationValue.textContent = elevationSlider.value;
    render();
  });

  durationSlider.addEventListener("input", () => {
    durationValue.textContent = durationSlider.value;
    render();
  });
}

function render() {
  const date = document.getElementById("datePicker").value;
  const location = document.getElementById("locationSelect").value;

  const elevationMin = parseFloat(document.getElementById("elevationSlider").value);
  const durationMin = parseFloat(document.getElementById("durationSlider").value);

  const tbody = document.querySelector("#tabla tbody");
  tbody.innerHTML = "";

  const filtered = dataGlobal
    .filter(r =>
      r.Date === date &&
      r.Location === location &&
      cleanNumber(r.Elevation) >= elevationMin &&
      cleanNumber(r.Duration) >= durationMin
    )
    .sort((a, b) => a.Rise.localeCompare(b.Rise));

  if (filtered.length === 0) {
    tbody.innerHTML = "<tr><td colspan='6'>No satellite passes found</td></tr>";
    return;
  }

  filtered.forEach(row => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.Satellite}</td>
      <td>${row.Rise}</td>
      <td>${row.Culmination}</td>
      <td>${row.Set}</td>
      <td>${row.Elevation}</td>
      <td>${row.Duration}</td>
    `;

    tbody.appendChild(tr);
  });
}
</script>

</body>
</html>
